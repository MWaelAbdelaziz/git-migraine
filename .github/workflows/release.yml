name: Release

# Publishes to npm when you push a version tag (e.g. v0.1.1), or on manual run.
# Uses npm "Trusted Publishing" (OIDC) — no npm tokens are stored anywhere.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs a recent npm.
      - name: Update npm
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test

      # No NODE_AUTH_TOKEN needed — npm authenticates via OIDC because this repo
      # + workflow are configured as a Trusted Publisher on npmjs.com.
      - name: Publish
        run: npm publish --provenance --access public
